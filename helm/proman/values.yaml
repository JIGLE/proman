# Default values for proman.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/jigle/proman
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1001

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: proman.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: proman-tls
  #    hosts:
  #      - proman.local

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# ── Application settings ──────────────────────────────────────────────────────
# These are rendered as individual env vars by the proman.env helper.
# NEXTAUTH_SECRET and INIT_SECRET are auto-generated on first install
# (stored in a K8s Secret) unless you provide explicit values here.
app:
  # REQUIRED: The URL users access the app at (protocol + host + port).
  nextauthUrl: "http://localhost"
  # SQLite database path inside the container (rarely needs changing).
  databaseUrl: "file:/app/data/proman.db"
  # Leave empty to auto-generate on first install.
  nextauthSecret: ""
  initSecret: ""

# Extra environment variables appended after the structured ones above.
# Use this for optional integrations (SendGrid, Google OAuth, etc.).
env: []
  # - name: SENDGRID_API_KEY
  #   value: "SG.xxx"
  # - name: GOOGLE_CLIENT_ID
  #   value: "xxx.apps.googleusercontent.com"
  # - name: GOOGLE_CLIENT_SECRET
  #   value: "xxx"

# Control whether a Helm Job is run to initialize Prisma
# (disabled by default — the init container in the Deployment handles this).
initJob:
  enabled: false

# Persistent volume for SQLite database
persistence:
  enabled: true
  accessMode: ReadWriteOnce
  size: 1Gi
  # storageClass: ""  # Leave empty for default