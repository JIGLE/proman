# TrueNAS SCALE tuned Helm values for ProMan
# Edit <POOL_NAME> and other values before installing.

replicaCount: 1

image:
  repository: ghcr.io/jigle/proman
  pullPolicy: IfNotPresent
  # Prefer using an explicit release tag; avoid 'latest' for production installs
  tag: ""

service:
  type: NodePort
  port: 80
  targetPort: 3000
  # Common default NodePort for HTTP on TrueNAS SCALE; change if conflict
  nodePort: 30080

ingress:
  enabled: false

# Security context — must match the container user (UID/GID 1001)
podSecurityContext:
  fsGroup: 1001

securityContext:
  runAsUser: 1001
  runAsGroup: 1001
  runAsNonRoot: true

env:
  - name: DATABASE_URL
    value: "file:/app/data/proman.db"
  - name: NEXTAUTH_URL
    # IMPORTANT: Replace with your TrueNAS IP/hostname
    value: "http://<TRUENAS_IP_OR_HOSTNAME>:30080"
  - name: NEXTAUTH_SECRET
    # IMPORTANT: Must be at least 32 characters. Generate with: openssl rand -base64 32
    value: "REPLACE-ME-with-at-least-32-characters-secret"
  - name: NODE_ENV
    value: "production"
  - name: HOSTNAME
    value: "0.0.0.0"
  - name: PORT
    value: "3000"
  - name: INIT_SECRET
    # IMPORTANT: Replace with a random secret. Generate with: openssl rand -hex 32
    # Required for the /api/debug/db/init endpoint (manual DB initialization)
    value: "REPLACE-ME-with-random-hex-secret"

# Run prisma db push as a post-install/post-upgrade Job
initJob:
  enabled: true

persistence:
  enabled: true
  # Use a hostPath on the TrueNAS SCALE pool (edit <POOL_NAME> to your pool)
  hostPath: /mnt/pools/<POOL_NAME>/apps/proman/data
  mountPath: /app/data
  accessMode: ReadWriteOnce
  size: 1Gi
  # storageClass: ""  # leave empty to use hostPath (no dynamic provisioning)

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

# Notes:
# - hostPath is not HA/resilient across node failures. Prefer a proper PVC backed by TrueNAS CSI if available.
# - If you expose via Ingress (Traefik) instead, set service.type to ClusterIP and enable ingress in your cluster.
