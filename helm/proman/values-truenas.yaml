# TrueNAS SCALE tuned Helm values for ProMan
#
# ━━━ You only need to edit TWO things: ━━━
#   1. app.nextauthUrl  — the URL you access the app at
#   2. persistence.hostPath — the dataset path on your TrueNAS pool
#
# Secrets (NEXTAUTH_SECRET, INIT_SECRET) are generated automatically
# on first install. All other defaults work out of the box.

# ── Required ──────────────────────────────────────────────────────────────────
app:
  # IMPORTANT: Must match the URL you access the app at (protocol + host + port).
  # Examples: https://proman.example.com  or  http://192.168.1.50:30080
  nextauthUrl: "http://<YOUR_TRUENAS_IP>:30080"

persistence:
  enabled: true
  # Edit <POOL_NAME> to match your TrueNAS storage pool
  hostPath: /mnt/pools/<POOL_NAME>/apps/proman/data

# ── Networking ────────────────────────────────────────────────────────────────
service:
  type: NodePort
  port: 80
  targetPort: 3000
  nodePort: 30080

# ── Security context (matches container UID/GID 1001) ─────────────────────────
podSecurityContext:
  fsGroup: 1001

securityContext:
  runAsUser: 1001
  runAsGroup: 1001
  runAsNonRoot: true

# ── Optional: Google OAuth ────────────────────────────────────────────────────
# To enable Google sign-in, uncomment and fill in:
# env:
#   - name: GOOGLE_CLIENT_ID
#     value: "<your-client-id>.apps.googleusercontent.com"
#   - name: GOOGLE_CLIENT_SECRET
#     value: "<your-client-secret>"

# Notes:
# - hostPath is not HA/resilient across node failures. Prefer a proper PVC backed by TrueNAS CSI if available.
# - If you expose via Ingress (Traefik) instead, set service.type to ClusterIP and enable ingress in your cluster.
