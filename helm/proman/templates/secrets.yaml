{{/*
  Auto-generated Kubernetes Secret for ProMan.

  On first install, NEXTAUTH_SECRET and INIT_SECRET are generated randomly
  (unless the operator provides explicit values via app.nextauthSecret / app.initSecret).

  On helm upgrade the existing Secret is looked up and its values are reused,
  so the secrets stay stable across upgrades.
*/}}
{{- $secretName := printf "%s-secrets" (include "proman.fullname" .) }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "proman.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if and $existingSecret $existingSecret.data }}
  {{/* Reuse existing values on upgrade */}}
  NEXTAUTH_SECRET: {{ index $existingSecret.data "NEXTAUTH_SECRET" }}
  INIT_SECRET: {{ index $existingSecret.data "INIT_SECRET" }}
  {{- else }}
  {{/* First install — use operator-provided values or generate random ones */}}
  NEXTAUTH_SECRET: {{ (.Values.app.nextauthSecret | default (randAlphaNum 48)) | b64enc | quote }}
  INIT_SECRET: {{ (.Values.app.initSecret | default (randAlphaNum 64)) | b64enc | quote }}
  {{- end }}
