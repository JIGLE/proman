name: Production Gate

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: production-${{ github.sha }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"

jobs:
  lint-type:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci || (npm install --package-lock-only --ignore-scripts && npm ci)

      - name: Run linter
        run: npm run lint

      - name: Format check
        run: npx prettier --check .

      - name: Type check
        run: npm run type-check

  test:
    name: Unit Tests with Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci || (npm install --package-lock-only --ignore-scripts && npm ci)

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-prod
          path: coverage
          if-no-files-found: ignore

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [lint-type, test]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Restore Next.js build cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci || (npm install --package-lock-only --ignore-scripts && npm ci)

      - name: Build (Next.js)
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_URL: file:./ci-build.db
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-test-secret-minimum-32-characters
          GOOGLE_CLIENT_ID: ci-placeholder
          GOOGLE_CLIENT_SECRET: ci-placeholder

      - name: Summary
        run: |
          echo "## Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "Deployed commit $GITHUB_SHA to production environment." >> $GITHUB_STEP_SUMMARY
    environment:
      name: production
